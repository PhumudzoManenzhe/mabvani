<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications | UniApply SA</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/layouts.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/student.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body class="student-page">
  <header class="student-mobile-header">
    <a class="student-logo" href="../../index.html"><span class="student-logo-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 8.25 12 4l9 4.25-9 4.25L3 8.25Z"></path><path d="M6.75 10.5v4.75c1.6 1.45 3.35 2.15 5.25 2.15s3.65-.7 5.25-2.15V10.5"></path></svg></span><span>UniApply<span class="student-logo-dot">.</span>SA</span></a>
    <button class="student-menu-button" type="button" aria-label="Open navigation" data-mobile-menu><svg viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg></button>
  </header>

  <div class="student-shell">
    <aside class="student-sidebar" aria-label="Student navigation">
      <a class="student-logo" href="../../index.html"><span class="student-logo-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 8.25 12 4l9 4.25-9 4.25L3 8.25Z"></path><path d="M6.75 10.5v4.75c1.6 1.45 3.35 2.15 5.25 2.15s3.65-.7 5.25-2.15V10.5"></path></svg></span><span>UniApply<span class="student-logo-dot">.</span>SA</span></a>
      <nav class="student-nav" aria-label="Primary">
        <a class="student-nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"></rect><rect x="14" y="4" width="6" height="6" rx="1"></rect><rect x="4" y="14" width="6" height="6" rx="1"></rect><rect x="14" y="14" width="6" height="6" rx="1"></rect></svg>Dashboard</a>
        <a class="student-nav-link" href="universities.html"><svg viewBox="0 0 24 24"><path d="M4 20h16"></path><path d="M6 20V9h5v11"></path><path d="M13 20V5h5v15"></path></svg>Universities</a>
        <a class="student-nav-link is-active" href="applications.html" aria-current="page"><svg viewBox="0 0 24 24"><rect x="6" y="4" width="12" height="16" rx="1.5"></rect><path d="M9 10h6"></path><path d="M9 14h4"></path></svg>Applications</a>
        <a class="student-nav-link" href="documents.html"><svg viewBox="0 0 24 24"><path d="M7 3.5h7l3 3V20H7V3.5Z"></path><path d="M14 3.5V7h3.5"></path></svg>Documents</a>
        <a class="student-nav-link" href="profile.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.25"></circle><path d="M5.75 20c.6-3.25 2.7-5 6.25-5s5.65 1.75 6.25 5"></path></svg>Profile</a>
        <a class="student-nav-link" href="results.html"><svg viewBox="0 0 24 24"><path d="M12 21a9 9 0 1 0-9-9"></path><path d="M12 12 17 7"></path></svg>APS Calculator</a>
      </nav>
      <button class="student-button student-signout" type="button" data-sign-out>Sign out</button>
    </aside>

    <main class="student-main" aria-labelledby="applications-title">
      <header class="student-page-header">
        <div>
          <h1 id="applications-title">Applications</h1>
          <p class="student-subtitle">Track draft, submitted, and reviewed applications.</p>
        </div>
        <a class="student-button primary pill" href="universities.html">New application</a>
      </header>

      <section class="student-section-stack" data-applications-list>
        <div class="student-empty-state" data-applications-empty>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16"></path><path d="M6 20V9h5v11"></path><path d="M13 20V5h5v15"></path></svg>
          <p class="student-muted">No applications yet.</p>
          <a class="student-button primary" href="universities.html">Browse universities</a>
        </div>

        <a class="student-card-link" href="application-details.html" hidden data-application-row>
          <article class="student-card student-card-body">
            <div class="student-list-row">
              <div>
                <h2 class="student-panel-title" data-application-university>University name</h2>
                <p class="student-muted" data-application-meta>No course selected &bull; Closes 2026-07-31</p>
              </div>
              <span class="student-badge warning" data-application-status>draft</span>
            </div>
          </article>
        </a>
      </section>
    </main>
  </div>

  <script type="module" src="../../js/pages/applications.js"></script>
</body>
</html>
