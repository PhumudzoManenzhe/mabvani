<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create your profile | UniApply SA</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/reset.css" />
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/layouts.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/public.css" />
    <link rel="stylesheet" href="../../css/responsive.css" />
  </head>
  <body class="public-page auth-page">
    <main class="auth-shell" aria-labelledby="register-title">
      <a
        class="template-logo auth-logo"
        href="../../index.html"
        aria-label="UniApply SA home"
      >
        <span class="template-logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M3 8.25 12 4l9 4.25-9 4.25L3 8.25Z"></path>
            <path
              d="M6.75 10.5v4.75c1.6 1.45 3.35 2.15 5.25 2.15s3.65-.7 5.25-2.15V10.5"
            ></path>
          </svg>
        </span>
        <span>UniApply<span class="logo-dot">.</span>SA</span>
      </a>

      <section class="auth-card">
        <h1 id="register-title">Create your profile</h1>
        <p>One profile. Every SA university.</p>

        <button
          class="button button-secondary auth-google"
          type="button"
          data-auth-google
        >
          <span aria-hidden="true"
            ><img
              src="https://www.svgrepo.com/show/475656/google-color.svg"
              alt="Google"
          /></span>
          Continue with Google
        </button>

        <div class="auth-divider"><span></span>or with email<span></span></div>

        <form class="auth-form" data-register-form>
          <div class="form-field">
            <label for="register-first-name">First Name</label>
            <input
              id="register-first-name"
              name="first_name"
              type="text"
              autocomplete="name"
            />
          </div>

          <div class="form-field">
            <label for="register-middle-name">Middle Name</label>
            <input
              id="register-middle-name"
              name="middle_name"
              type="text"
              autocomplete="name"
            />
          </div>

          <div class="form-field">
            <label for="register-last-name">Last Name</label>
            <input
              id="register-last-name"
              name="last_name"
              type="text"
              autocomplete="name"
            />
          </div>

          <div class="form-field">
            <label for="register-email">Email</label>
            <input
              id="register-email"
              name="email"
              type="email"
              autocomplete="email"
            />
          </div>

          <div class="form-field">
            <label for="register-password">Password</label>
            <input
              id="register-password"
              name="password"
              type="password"
              autocomplete="new-password"
            />
          </div>

          <div class="form-field">
            <label for="register-confirm-password">Confirm Password</label>
            <input
              id="register-confirm-password"
              name="confirm_password"
              type="password"
              autocomplete="new-password"
            />
          </div>

          <button class="button button-primary" type="submit">
            Create account
          </button>
        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </section>

      <a class="auth-back" href="../../index.html">Back to home</a>
    </main>

    <script type="module" src="../../js/pages/register.js"></script>
  </body>
</html>
