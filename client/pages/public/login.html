<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in | UniApply SA</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/layouts.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/public.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body class="public-page auth-page">
  <main class="auth-shell" aria-labelledby="login-title">
    <a class="template-logo auth-logo" href="../../index.html" aria-label="UniApply SA home">
      <span class="template-logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M3 8.25 12 4l9 4.25-9 4.25L3 8.25Z"></path>
          <path d="M6.75 10.5v4.75c1.6 1.45 3.35 2.15 5.25 2.15s3.65-.7 5.25-2.15V10.5"></path>
        </svg>
      </span>
      <span>UniApply<span class="logo-dot">.</span>SA</span>
    </a>

    <section class="auth-card">
      <h1 id="login-title">Welcome back</h1>
      <p>Sign in to continue your applications.</p>

      <button class="button button-secondary auth-google" type="button" data-auth-google>
        <span aria-hidden="true">G</span>
        Continue with Google
      </button>

      <div class="auth-divider"><span></span>or with email<span></span></div>

      <form class="auth-form" data-login-form>
        <div class="form-field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email">
        </div>

        <div class="form-field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password">
        </div>

        <button class="button button-primary" type="submit">Sign in</button>
      </form>

      <p class="auth-switch">Do not have an account? <a href="register.html">Sign up</a></p>
    </section>

    <a class="auth-back" href="../../index.html">Back to home</a>
  </main>

  <script type="module" src="../../js/pages/login.js"></script>
</body>
</html>
